name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # The version ALONE does not identify a build: two Bun binaries reporting 1.3.14 can behave
      # differently, and that difference is invisible from a developer machine where everything passes.
      # Printing the revision and arch turns "works locally, fails on CI" into a comparison rather than a
      # guess - the Vite build was debugged as a nifra bug for several rounds because this line did not
      # exist and the runtime was assumed identical.
      - name: Runtime identity (version alone does not identify a build)
        run: |
          bun --version
          bun --revision
          uname -srm

      - name: Install
        run: bun install --frozen-lockfile

      # Cross-package imports (e.g. cli → @nifrajs/web) resolve via each package's built
      # .d.ts, not via tsconfig paths — so typecheck needs dist. check:publish re-packs later.
      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Typecheck (also runs the *.test-d.ts type-level tests)
        run: bun run typecheck

      - name: Test (scoped to the library test dirs; coverage + threshold via bunfig)
        run: bun run test

      # Enforce the doc gates in CI (not just `bun run check` locally): documented snippets must
      # typecheck against the live API, and api-reference.md + the per-package LLM.md cards must be
      # regenerated — so docs/example drift can't merge. Needs the build above (snippets resolve
      # @nifrajs/* subpaths via the built dist types).
      - name: Doc gates (samples typecheck, api-reference + LLM cards fresh)
        run: bun run check:docs && bun run check:api && bun run check:cards

      - name: Build + publish-readiness (publint + arethetypeswrong)
        run: bun run check:publish

      # Cold-start gate: the `bun create nifra` → `bun install` → `bun run build` path a fresh external
      # user takes. alpha.4's templates pinned `@nifrajs/*@^0.1.0` (excludes the published prerelease) →
      # every scaffolded app failed to install; the package-level gates never look at the templates.
      # Static pin-satisfiability + a functional scaffold/install/build against the packed current source.
      - name: Cold-start gate (templates install + build for a fresh user)
        run: bun run check:cold-start

      # Bundle-size gate: per-feature gzip budgets (FEATURE_GZIP_BUDGET_KB in bench/size/run.ts).
      # What ships in a user's server artifact is a headline claim, and the marginal cost of a
      # feature is only visible at the moment it lands — a byte-count regression is invisible in
      # review and unattributable a release later. Deterministic (same minifier, fixed app shapes,
      # pinned Bun), so it belongs in CI where wall-clock throughput does not: `bench:http` measures
      # requests/sec via `oha`, and shared runners have noisy neighbours that swing that severalfold
      # run to run. A gate that cries wolf gets disabled, so throughput stays a local/manual
      # comparison (`bench:http:compare`) and CI gates only the reproducible number.
      - name: Bundle-size gate (per-feature gzip budgets)
        run: bun run check:size

  deno:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build @nifrajs/core (Deno loads built dist)
        # Core's dist must exist for Deno's resolver.
        run: bun run --filter '@nifrajs/core' build

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck + test @nifrajs/deno on Deno
        run: bun run test:deno

  # The Node adapter exercised on Node, not on Bun. `bun run test` covers packages/node/test, which
  # proves the adapter's logic but runs it on the wrong runtime — and an HTTP adapter is precisely
  # where Bun and Node diverge (stream semantics, `node:` builtin behaviour, socket teardown). Deno
  # already had this job; Node and Workers did not, so two published adapters had zero coverage on
  # the runtimes they exist for. This closes the Node half.
  node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install
        run: bun install --frozen-lockfile

      # Node resolves the package `exports` `default` condition → dist, which is what an installed
      # Node user actually loads. Same reason the Deno job builds first.
      - name: Build (Node loads built dist)
        run: bun run build

      # `bun install` writes no node_modules/@nifrajs/* entries — Bun resolves the workspace through
      # its own map — so without this step Node cannot resolve the packages at all.
      - name: Test @nifrajs/node on Node
        run: bun run test:node
