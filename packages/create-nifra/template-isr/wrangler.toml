name = "nifra-isr"
main = "dist-server/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Workers Assets: the content-hashed client bundle (buildClient → ./public/assets) is served at
# /assets/*. Non-asset paths fall through to the worker (SSR + ISR).
assets = { directory = "./public" }

# The ISR page cache. `wrangler dev` provides a LOCAL (miniflare) KV automatically — no Cloudflare
# account needed. For `wrangler deploy`, create a namespace and paste its id:
#   bunx wrangler kv namespace create ISR_CACHE
[[kv_namespaces]]
binding = "ISR_CACHE"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# On-demand revalidation secret. DEV placeholder — set a real one for production with
# `bunx wrangler secret put REVALIDATE_SECRET`.
[vars]
REVALIDATE_SECRET = "dev-secret"
