# Test runner configuration.
# Coverage is on for every `bun test`. The 0.9 floor is the global gate
# (≥90% line/function coverage per file); the router/validator/descriptor core is held to
# 100% by review (the per-file report makes any regression visible immediately).
[test]
coverage = true
coverageThreshold = 0.9
# Bun-only build/dev tooling: integration-tested via `site:build` / `nifra dev`, not unit-testable to
# 90% — excluded from the per-file unit-coverage gate so importing one exported helper for a focused
# test (e.g. the chunk-name sanitizer, the rolldown-plugin normalizer) doesn't drag the whole module
# under threshold.
coveragePathIgnorePatterns = [
  "**/web/src/build.ts",
  "**/web/src/vite.ts",
  "**/web/src/dev.ts",
  "**/web/src/prerender.ts",
]
pathIgnorePatterns = ["**/template/**", "**/template-*/**"]
