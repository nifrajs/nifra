# Test runner configuration.
# Coverage is on for every `bun test`. The 0.9 floor is the global gate
# (≥90% line/function coverage per file); the router/validator/descriptor core is held to
# 100% by review (the per-file report makes any regression visible immediately).
[test]
coverage = true
coverageThreshold = 0.9
# Bun-only build/dev tooling: integration-tested via `site:build` / `nifra dev`, not unit-testable to
# 90% — excluded from the per-file unit-coverage gate so importing one exported helper for a focused
# test (e.g. the chunk-name sanitizer, the rolldown-plugin normalizer) doesn't drag the whole module
# under threshold.
coveragePathIgnorePatterns = [
  "**/web/src/build.ts",
  "**/web/src/vite.ts",
  "**/web/src/dev.ts",
  "**/web/src/prerender.ts",
  # Throwaway temp APPS that the build-tooling tests (`buildTarget`/`buildClient`) generate + bundle:
  # their stub route components are bundled, never rendered (the stub adapter emits chain length, not
  # the component), so they report 0% function coverage. They aren't product code — exclude the temp
  # fixture dirs from the per-file gate (same rationale as build.ts above).
  "**/web/test/.tmp-*/**",
  # The `@nifrajs/cli` package is dev/MCP tooling — command dispatch (`cli.ts`), stdio/JSON-RPC MCP
  # servers (`mcp.ts`, `mcp-render.ts`, `mcp-run.ts`, `mcp-ws.ts`), and `check`/`doctor`/`port`. Its
  # tests NOW run in the gated suite (so regressions are caught), but the spawn/stdio/process surface
  # isn't unit-testable to 90% — exclude `cli/src` from the per-file gate, same rationale as the
  # build/dev tooling above. Behavior is gated by the tests running, not by a line-coverage floor.
  "**/cli/src/**",
  # Temp route/app fixtures the cli tests mkdtemp into the system temp dir (`nifra-routes-*`,
  # `nifra-render-*`, `nifra-run-*`, `nifra-scaffold-*`, `tmp-nifra-ws-*`, …): their stub `.tsx`
  # routes are bundled/scanned, never rendered, so they report 0% function coverage (same class as
  # `web/test/.tmp-*` above). No repo path segment starts with `nifra-`, so these never match product
  # code — only the throwaway fixtures.
  "**/nifra-*/**",
  "**/tmp-nifra-*/**",
  "**/.tmp-nifra-*/**",
  # Demo apps under `examples/` that the cli render/run tests bundle as real fixtures: their route
  # components are bundled, not exercised, so they report low function coverage. They're sample code,
  # not unit-tested product code — exclude from the per-file gate.
  "**/examples/**",
]
pathIgnorePatterns = ["**/template/**", "**/template-*/**"]
